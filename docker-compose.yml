# docker-compose.yml  (project root)
version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: codesense_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: codesense

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codesense_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/vector_store:/app/vector_store
      - ./backend/logs:/app/logs

volumes:
  mongo_data:
